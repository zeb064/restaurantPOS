[project]
name = "restaurant-pos"
plan = "free"

[auth]
enabled = true
site_url = "https://<tu-project>.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000",
  "https://*.vercel.app",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.external]
email = true
google = false
facebook = false
apple = false

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_request_size = 10485760

[db]
port = 54322
migration_dirs = ["supabase/migrations"]

[realtime]
enabled = true
